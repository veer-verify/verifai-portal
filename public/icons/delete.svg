<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 24 24"
     width="24"
     height="24">

  <!-- Mask: white = visible, black = hole -->
  <mask id="trashMask">
    <rect width="24" height="24" fill="white"/>

    <!-- Inner cut-out lines -->
    <rect x="9" y="10" width="1.6" height="7" fill="black"/>
    <rect x="13.4" y="10" width="1.6" height="7" fill="black"/>
  </mask>

  <!-- Cap top bar -->
  <rect x="3" y="5" width="18" height="1.8" rx="0.4" fill="#ed3237"/>

  <!-- Cap handle -->
  <path
    d="M9 5
       L9.7 3.8
       C10.1 3.2 10.4 3 12 3
       C13.6 3 13.9 3.2 14.3 3.8
       L15 5Z"
    fill="#ed3237"/>

  <!-- Bin body -->
  <path
    d="M6 7
       L7 19
       C7.15 21 8.2 22 12 22
       C15.8 22 16.85 21 17 19
       L18 7Z"
    fill="#ed3237"
    mask="url(#trashMask)"/>

</svg>
