<div class="range-picker">
  <div class="range-header">
    <button
      type="button"
      class="nav-btn"
      (click)="navigateDays(-1)"
      [disabled]="!canNavigatePrevious"
      aria-label="Previous date range"
    >
      &#8249;
    </button>

    <button type="button" class="range-trigger" (click)="toggleOpen()">
      <span class="trigger-line">
        {{ formattedStart }} | {{ formattedEnd }}
      </span>
      <img src="icons/calendar.svg" class="trigger-icon" />
    </button>

    <button
      type="button"
      class="nav-btn"
      (click)="navigateDays(1)"
      [disabled]="!canNavigateNext"
      aria-label="Next date range"
    >
      &#8250;
    </button>
  </div>

  <div class="picker-panel" *ngIf="isOpen">
    <!-- <div class="close-btn-parent">
      <button type="button" class="close-btn" (click)="toggleOpen()">
        <span class="material-symbols-outlined"> close_small </span>
      </button>
    </div> -->

    <div class="picker-layout">
      <div class="inline-calendar-wrap">
        <div class="field-toggle">
          <button
            type="button"
            class="field-chip"
            [class.active]="activeField === 'start'"
            (click)="setActiveField('start')"
          >
            Start
          </button>
          <button
            type="button"
            class="field-chip"
            [class.active]="activeField === 'end'"
            (click)="setActiveField('end')"
          >
            End
          </button>
        </div>

        <mat-calendar
          [selected]="selectedCalendarDate"
          [maxDate]="maxCalendarDate"
          (selectedChange)="onCalendarSelect($event)"
        ></mat-calendar>
      </div>

      <div class="range-fields">
        <div
          class="range-card"
          [class.active]="activeField === 'start'"
          (click)="setActiveField('start')"
        >
          <div class="range-card-head">
            <span class="range-card-label">Start</span>
            <span class="range-card-value">{{ draftFormattedStart }}</span>
          </div>
          <div class="time-controls">
            <label class="time-select">
              <span>Hour</span>
              <select [(ngModel)]="draftStartHour">
                <option *ngFor="let hour of hourOptions" [value]="hour">
                  {{ hour }}
                </option>
              </select>
            </label>
            <label class="time-select">
              <span>Minute</span>
              <select [(ngModel)]="draftStartMinute">
                <option *ngFor="let minute of minuteOptions" [value]="minute">
                  {{ minute }}
                </option>
              </select>
            </label>
          </div>
        </div>

        <div
          class="range-card"
          [class.active]="activeField === 'end'"
          (click)="setActiveField('end')"
        >
          <div class="range-card-head">
            <span class="range-card-label">End</span>
            <span class="range-card-value">{{ draftFormattedEnd }}</span>
          </div>
          <div class="time-controls">
            <label class="time-select">
              <span>Hour</span>
              <select [(ngModel)]="draftEndHour">
                <option *ngFor="let hour of hourOptions" [value]="hour">
                  {{ hour }}
                </option>
              </select>
            </label>
            <label class="time-select">
              <span>Minute</span>
              <select [(ngModel)]="draftEndMinute">
                <option *ngFor="let minute of minuteOptions" [value]="minute">
                  {{ minute }}
                </option>
              </select>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="secondary-btn" (click)="reset()">
        Reset
      </button>
      <button type="button" class="primary-btn" (click)="apply()">Apply</button>
    </div>
  </div>
</div>
