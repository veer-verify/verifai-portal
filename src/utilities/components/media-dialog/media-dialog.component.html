<section>
  <header class="dialog-header">
    <a>Dialog</a>
    <a mat-dialog-close
      ><img src="icons/cancel_24dp_999999.svg" width="16px"
    /></a>
  </header>

  @if (data?.files.length) {
  <main class="dialog">
    @for (item of data?.files; track $index) { @if (isVideo(item)) {

    <video [src]="item | media | async" autoplay controls></video>
    } @else {
    <img [src]="item | media | async" />
    } }
  </main>
  } @else {
  <p>no data!</p>
  }
</section>
