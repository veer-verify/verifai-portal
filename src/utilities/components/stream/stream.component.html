<div
  class="video-container"
  [class.dot-disabled]="!dotEnabled"
  (click)="placeDot($event)"
>
  @if (showLoader) {
    <div class="eye-logo">
      <img src="gif/loading-gif.gif" alt="" width="200" />
    </div>
  }
  @if (isChecked) {
    <div class="info">
      <span
        ><img
          src="icons/camera-grey.svg"
          alt=""
          width="16px"
          class="me-2"
          (click)="playSiren1(); $event.stopPropagation()"
        />{{ videoData?.name }}</span
      >
      <span>
        <a (click)="capture(); $event.stopPropagation()"
          ><img
            src="icons/screenshot.svg"
            alt=""
            title="Screenshot"
            width="16px"
            class="me-2"
        /></a>
        <a (click)="playSiren1(); $event.stopPropagation()"
          ><img src="icons/siren.svg" alt="" title="Siren" width="16px"
        /></a>
      </span>
    </div>
  }

  @if (markerPositions.length) {
    @for (marker of markerPositions; track marker.id) {
      <span
        class="click-marker"
        [style.left.px]="marker.x"
        [style.top.px]="marker.y"
      ></span>
    }
  }

  <video #video width="100%" height="100%"></video>
</div>
