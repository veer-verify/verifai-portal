@if (showLoader) {
<div class="eye-logo">
  <img src="gif/loading-gif.gif" alt="" width="200" />
</div>
} @if (isChecked) {
<div class="info">
  <span>{{ videoData?.name }}</span>
  <span>
    <a (click)="capture()"
      ><img
        src="icons/screenshot.svg"
        alt=""
        title="Screenshot"
        width="16px"
        class="me-2"
    /></a>
    <a><img src="icons/siren.svg" alt="" title="Siren" width="16px" (click)="playSiren1()"/></a>
  </span>
</div>
}

<video #video width="100%" height="100%"></video>
