<div class="header-container" appGlobalClick>
  <div class="d-flex gap-5">
    <div>
      <img src="/themes/verifai/logo-black.png" alt="" width="100px" />
    </div>

    @if (storage_service.currentSite$ | async; as site) {
    <div class="site-accordian">
      <a (click)="toggleSites()">{{ site.siteName }}</a>

      @if (showSite) {
      <div class="site-dropdown">
        <input type="search" [(ngModel)]="searchSite" #siteInput />
        @for (item of sitesList | async | search: searchSite; track $index) {
        <p (click)="updateSite(item)">
          <img src="icons/dot-1.svg" width="10px" class="me-1" />
          {{ item.siteName }}
        </p>
        } @empty {
        <p class="text-center bg-secondary">{{ "no sites!" | titlecase }}</p>
        }
      </div>
      }
      <span class="material-symbols-outlined" (click)="toggleSites()"
        >keyboard_arrow_down</span
      >
    </div>
    }
  </div>

  <div class="nav-items">
    <a
      class="list-group-item"
      routerLink="/dashboard/live-view"
      routerLinkActive="active"
      >live view</a
    >
    <a
      class="list-group-item"
      routerLink="/dashboard/alerts"
      routerLinkActive="active"
      >Alerts</a
    >
    <a
      class="list-group-item"
      routerLink="/dashboard/service-requests"
      routerLinkActive="active"
      >support</a
    >
    <a
      class="list-group-item d-inline-flex align-items-center"
      [matMenuTriggerFor]="menu"
    >
      <span class="material-symbols-outlined">account_circle</span>
      <!-- <span>
                <p>user name</p>
                <p>admin</p>
            </span> -->
    </a>
    <!-- <a class="pointer" [matMenuTriggerFor]="menu"><img src="icons/logout-person-image.svg" alt="" width="12px"></a> -->

    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <a>
          <img src="icons/profile.svg" alt="" width="8px" class="me-2" />
          <span class="profile-image">PROFILE</span>
        </a>
      </button>
      <button mat-menu-item>
        <a>
          <img src="icons/key.svg" alt="" width="6px" class="me-2" />
          <span class="profile-key">CHANGE PASSWORD</span>
        </a>
      </button>
      <button mat-menu-item>
        <a class="profile-terms">
          <img
            src="icons/info-circle-fill.svg"
            alt=""
            width="8px"
            class="me-2"
          />
          <span>TERMS & CONDITIONS</span>
        </a>
      </button>
      <button mat-menu-item (click)="logout()">
        <a class="profile-logout">
          <img src="icons/logout.svg" alt="" width="10px" class="me-2" />
          <span>LOGOUT</span>
        </a>
      </button>
    </mat-menu>
  </div>
</div>
