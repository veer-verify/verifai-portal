<div class="tool-bar">
  <span>ALL REQUESTS</span>

  <div class="d-inline-flex">
    <button class="req-button me-3" (click)="openNewRequestModal()">
      NEW REQUEST
    </button>

    <button
      class="filter"
      [matMenuTriggerFor]="filterMenu"
      (click)="resetForm()"
    >
      <span class="material-symbols-outlined text-danger"> filter_list </span>
    </button>

    <mat-menu #filterMenu="matMenu" panelClass="filter-menu">
      <ng-template matMenuContent>
        <div class="filter-header">
          <span>FILTER</span>
          <span class="material-symbols-outlined text-danger"> cancel </span>
        </div>

        <form
          class="filter-content"
          [formGroup]="filterForm"
          (click)="$event.stopPropagation()"
        >
          <label>Camera</label>
          <select formControlName="camera">
            <option value="" disabled>Select</option>
            @for(cam of camerasList; track cam){
            <option [value]="cam.id">{{ cam.name }}</option>
            }
          </select>

          <label class="mt-3">Alert</label>
          <select formControlName="serviceCategory" (change)="filterSubs()">
            <option value="" disabled>Select</option>
            @for(cat of categoryList; track cat){
            <option [value]="cat.catId">{{ cat.catName }}</option>
            }
          </select>

          <label class="mt-3">Sub-Alert</label>
          <select formControlName="serviceSubCategory">
            <option value="" disabled>Select</option>
            @for(subcat of subcategoryList; track subcat){
            <option [value]="subcat.serviceSubcatId">
              {{ subcat.serviceSubcatName }}
            </option>
            }
          </select>

          <label class="mt-3">Start Date</label>
          <div class="date-time">
            <span class="label">START</span>
            <input type="date" formControlName="fromDate" />
          </div>

          <label class="mt-3">End Date</label>
          <div class="date-time">
            <span class="label">END</span>
            <input type="date" formControlName="toDate" />
          </div>

          <!-- <label class="date-label">Duration</label>
          <div class="duration-container">
            <div
              class="range-slider"
              [style.--start]="startPercent"
              [style.--end]="endPercent"
            >
              <input
                type="range"
                class="range-start"
                min="0"
                max="120"
                step="1"
                [value]="durationStart"
                (input)="onStartChange($event)"
              />

              <input
                type="range"

                min="0"
                max="120"

                [value]="durationEnd"
                (input)="onEndChange($event)"
              />
            </div>
          </div>

          <div class="range-labels">
            <span>{{ formatTime(durationStart) }}</span>
            <span>{{ formatTime(durationEnd) }}</span>
          </div>

          <div class="duration-display">
            {{ formatTime(durationStart) }} to {{ formatTime(durationEnd) }}
          </div> -->

          <div class="filter-btns">
            <button
              class="btn-secondary"
              (click)="filterForm.reset(); onFilterChange()"
            >
              RESET
            </button>
            <button class="btn-primary" (click)="onFilterChange()">
              APPLY
            </button>
          </div>
        </form>
      </ng-template>
    </mat-menu>
  </div>
</div>

<!-- table -->
<div style="height: calc(100vh - 120px); display: flex; flex-direction: column">
  <ag-grid-angular
    style="height: 100%"
    [columnDefs]="columnDefs"
    [serverSideDatasource]="datasource"
    [gridOptions]="gridOptions"
    (gridReady)="onGridReady($event)"
    (cellClicked)="onCellClicked($event)"
  ></ag-grid-angular>
</div>

@if(showNewRequestModal) {
<app-new-request
  [currentRequestData]="currentRequest"
  (closeModal)="closeNewRequestModal($event)"
></app-new-request>
}
