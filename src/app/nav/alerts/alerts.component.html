<main>
  <div class="tool-bar">
    <div class="filters-row">
      <div
        class="hamburger py-1"
        (click)="storage_service.openSideNav()"
        *ngIf="!(storage_service.showSideNav$ | async)"
      >
        &#9776;
      </div>

      <div class="left">
        <div class="select-with-icon">
          <img src="icons/drop_cam.svg" alt="" class="icon" />
          <select
            class="tag-select"
            [(ngModel)]="cameraId"
            (ngModelChange)="onFilterChange()"
          >
            <option value="">ALL ({{ this.camerasList.length }})</option>
            @for (item of camerasList; track $index) {
              <option [value]="item?.cameraId">{{ item.name }}</option>
            } @empty {
              <option disabled>No cameras available</option>
            }
          </select>
        </div>

        <select
          class="tag-select"
          [(ngModel)]="actionTag"
          (ngModelChange)="onFilterChange()"
        >
          <option value="">Alert Tags (All)</option>
          @for (item of siteAlerts | async; track $index) {
            <option [value]="item.alertId">{{ item.alert }}</option>
          }
        </select>

        <app-calendar
          [startDate]="fromDate"
          [startTime]="fromTime"
          [endDate]="toDate"
          [endTime]="toTime"
          [maxDate]="today"
          (rangeApply)="onRangeApply($event)"
        ></app-calendar>

        <div class="ec-download">
          <button
            type="button"
            class="download-btn"
            (click)="downloadExcelReport()"
            pTooltip="Generate Excel Report"
          >
            <ng-container *ngIf="!spinexcel">
              <img src="icons/excel.png" alt="excel" class="excel-icon" />
            </ng-container>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-wrap" style="height: calc(100vh - 154px)">
    <ag-grid-angular
      class="custom-grid"
      style="height: 100%"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      [rowData]="rowData"
      (cellClicked)="onCellClicked($event)"
    ></ag-grid-angular>
  </div>

  <app-pagination
    [totalPages]="totalPages"
    (changePSize)="changePageSize($event)"
    (changePageNumber)="changePage($event)"
  ></app-pagination>
</main>
