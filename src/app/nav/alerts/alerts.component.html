    <span>ALL ALERTS</span>
    <div>
      <button class="filter" [matMenuTriggerFor]="filterMenu" (click)="resetForm()">
        <img src="icons/filter.svg" alt="" />
      </button>

      <mat-menu #filterMenu="matMenu" panelClass="filter-menu">
        <ng-template matMenuContent>
          <div class="filter-header">
            <span>FILTER</span>
            <span class="material-symbols-outlined text-danger"> cancel </span>
          </div>

          <form class="filter-content" [formGroup]="filterForm" (click)="$event.stopPropagation()">
            <label>Camera</label>
            <select formControlName="cameraId">
              <option value="" disabled>Select</option>
              @for(cam of camerasList; track cam){
              <option [value]="cam.cameraId">{{ cam.name }}</option>
              }
            </select>

            <label class="mt-3">Action</label>
            <select formControlName="actionTag">
              <option value="" disabled>Select</option>
              @for(cat of actionTags; track cat){
              <option [value]="cat.keyId">{{ cat.value }}</option>
              }
            </select>

            <label class="mt-3">Start Date</label>
            <div class="date-time">
              <label class="m-0">START</label>
              <input type="date" formControlName="fromDate" />
            </div>

            <label class="mt-3">End Date</label>
            <div class="date-time">
              <label class="m-0">END</label>
              <input type="date" formControlName="toDate" />
            </div>

            <div class="filter-btns">
              <button class="btn-secondary" (click)="filterForm.reset(); onFilterChange()">
                RESET
              </button>
              <button class="btn-primary" (click)="onFilterChange()">
                APPLY
              </button>
            </div>
          </form>
        </ng-template>
      </mat-menu>
    </div>
  </div>

  <!-- table -->
  <div style="height: calc(100vh - 120px); display: flex; flex-direction: column">
    <ag-grid-angular class="custom-grid" style="height: 100%" [columnDefs]="columnDefs"
      [serverSideDatasource]="datasource" [gridOptions]="gridOptions" (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)"></ag-grid-angular>
  </div>
</main>
