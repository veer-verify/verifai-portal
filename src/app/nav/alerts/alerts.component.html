<main>
  <div>
    <div class="toolbar">
      <div class="left">
        <select class="tag-select" [(ngModel)]="cameraId" (change)="onFilterChange()">
          <option value="">ALL({{this.camerasList?.length}})</option>
          @for (item of camerasList; track $index) {
          <option [value]="item?.cameraId">{{item.name}}</option>
          }
        </select>
        <select class="tag-select">
          <option>All Action Tags</option>
          @for (item of actionTags; track $index) {
          <option>{{item.value}}</option>
          }
        </select>
      </div>

      <div class="center">
        <span class="label">START</span>
        <div class="date-time">

        </div>

        <span class="label">END</span>
        <div class="date-time">


        </div>
      </div>

      <div class="right">
        <span class="label" [class.analyticsred]="isChecked">ANALYTICS</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="isChecked" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>


  <app-table [fields]="fields" [datasource]="gridDatasource" (gridReady)="onGridReady($event)"></app-table>

</main>
