<div class="playback">
  <div class="tool-bar">
    <div class="time-range">
      <div class="calender">
        <input type="date" [(ngModel)]="selectedDate" />
      </div>
      <div class="fake-range">
        <div class="d-flex align-items-center gap-2">
          <input type="time" [(ngModel)]="startTime" />
          -
          <input type="time" [(ngModel)]="endTime" />
        </div>
      </div>
    </div>

    <button class="go-btn" (click)="applyRange()" [disabled]="isLoading">
      <span class="material-symbols-outlined"> arrow_forward </span>
    </button>
  </div>

  <div class="main">
    <div class="sidebar">
      <!-- <div class="sidebar-title">Cameras</div> -->
      <div
        class="camera"
        *ngFor="let cam of cameraList"
        (click)="selectCamera(cam)"
        [class.active]="cam === selectedCamera"
      >
        <div class="camera-thumb">
          <img
            [src]="(cam.snapshotUrl | media | async) || dummyCameraImage"
            alt="Camera thumbnail"
            (error)="onCameraThumbError($event)"
          />
        </div>
        <div class="cam-label">
          <span class="material-symbols-outlined">videocam</span>
          <strong>{{ cam.name || cam.cameraName || cam.cameraId }}</strong>
        </div>
      </div>

      <div class="empty-state compact" *ngIf="!cameraList.length">
        No cameras available
      </div>

      <!-- <div class="sidebar-title clips-title">Playback Clips</div>
      <div
        class="clip"
        *ngFor="let video of playbackList; let i = index"
        (click)="selectVideo(video)"
        [class.active]="video === selectedVideo"
      >
        <span class="material-symbols-outlined">movie</span>
        <div>
          <strong>{{ video.datetime || "Clip " + (i + 1) }}</strong>
          <small>{{ video.key }}</small>
        </div>
      </div>

      <div class="empty-state compact" *ngIf="!playbackList.length && !isLoading">
        No playback clips
      </div> -->
    </div>

    <div class="video-container">
      <div class="video-frame">
        <video
          #playbackVideo
          *ngIf="selectedVideo?.url; else playbackEmpty"
          [src]="selectedVideo.url"
          autoplay
          (loadedmetadata)="onVideoLoaded()"
          (timeupdate)="updateProgress()"
          (play)="isPlaying = true"
          (pause)="isPlaying = false"
          (ended)="isPlaying = false"
        ></video>

        <ng-template #playbackEmpty>
          <div class="empty-state">
            {{
              errorMessage || "Select a camera and time range to load playback"
            }}
          </div>
        </ng-template>
      </div>

      <div class="controls">
        <div class="left-controls">
          <span class="material-symbols-outlined">volume_up</span>
          <button
            type="button"
            class="control-icon-btn"
            (click)="changeVolume(-10)"
            title="Volume down"
          >
            <span class="material-symbols-outlined">remove</span>
          </button>
          <input
            type="range"
            min="0"
            max="100"
            [ngModel]="volume"
            (ngModelChange)="updateVolume($event)"
          />
          <button
            type="button"
            class="control-icon-btn"
            (click)="changeVolume(10)"
            title="Volume up"
          >
            <span class="material-symbols-outlined">add</span>
          </button>

          <button
            type="button"
            class="control-icon-btn primary"
            (click)="togglePlayback()"
            [title]="isPlaying ? 'Pause' : 'Play'"
          >
            <span class="material-symbols-outlined">
              {{ isPlaying ? "pause" : "play_arrow" }}
            </span>
          </button>
          <button
            type="button"
            class="control-icon-btn"
            (click)="stopPlayback()"
            title="Stop"
          >
            <span class="material-symbols-outlined">stop</span>
          </button>

          <!-- <input
            type="range"
            min="0"
            max="100"
            [ngModel]="progress"
            (ngModelChange)="seekVideo($event)"
          /> -->
          <div class="speed-control">
            <!-- <span class="material-symbols-outlined">speed</span> -->
            <input
              type="range"
              min="0.25"
              max="4"
              step="0.25"
              [ngModel]="playbackRate"
              (ngModelChange)="updatePlaybackRate($event)"
            />
          </div>
          <button type="button" class="speed-btn" (click)="setPlaybackRate()">
            {{ playbackRate }}x
          </button>
          <span class="playback-count" *ngIf="playbackMeta">
            {{ playbackMeta.count || playbackList.length }} clips
          </span>
        </div>

        <div class="timeline-wrapper">
          <div class="tick-bar">
            <span
              class="tick"
              *ngFor="let tick of ticks; let i = index"
              [class.major]="i % ticksPerHour === 0"
              [class.medium]="i % (ticksPerHour / 2) === 0"
            ></span>

            <div class="labels">
              <span
                class="label"
                *ngFor="let h of hours; let i = index"
                [style.left.%]="(i / 24) * 100"
              >
                {{ h }}
              </span>
            </div>
          </div>

          <div class="timeline-nav-strip">
            <button
              type="button"
              class="timeline-nav-btn"
              aria-label="Previous"
            >
              &#8249;
            </button>
            <div class="timeline-nav-track">
              <button
                type="button"
                class="timeline-clip"
                *ngFor="let video of playbackList"
                [class.active]="video === selectedVideo"
                [style.left.%]="getClipPosition(video)"
                (click)="selectVideo(video)"
                [title]="video.datetime"
              ></button>
            </div>
            <button type="button" class="timeline-nav-btn" aria-label="Next">
              &#8250;
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
