<section>
  <app-err-info></app-err-info>

  <div class="tool-bar">
    <div class="d-inline-flex gap-2">
      <div class="select-with-icon">
        <img src="icons/drop_cam.svg" alt="" class="icon" />
        <select
          class="tag-select"
          [(ngModel)]="cameraId"
          (ngModelChange)="biAnalyticsReport()"
        >
          <option value="" selected>
            <img src="icons/drop_cam.svg" alt="" />ALL
          </option>
          <option *ngFor="let item of camList" [value]="item.cameraId">
            {{ item?.name }}
          </option>
        </select>
      </div>

      <div class="calendar">
        <span>START</span>
        <input
          matInput
          [matDatepicker]="picker1"
          placeholder="MM-DD-YYYY"
          [(ngModel)]="fromDate"
          [max]="today"
          (ngModelChange)="biAnalyticsReport()"
        />

        <img
          src="icons/calendar.svg"
          class="calendar-icon"
          (click)="picker1.open()"
        />

        <mat-datepicker #picker1></mat-datepicker>
      </div>

      <div class="calendar">
        <span>END</span>
        <input
          matInput
          [matDatepicker]="picker2"
          placeholder="MM-DD-YYYY"
          [(ngModel)]="toDate"
          [max]="today"
          (ngModelChange)="biAnalyticsReport()"
        />

        <img
          src="icons/calendar.svg"
          class="calendar-icon"
          (click)="picker2.open()"
        />

        <mat-datepicker #picker2></mat-datepicker>
      </div>
    </div>

    <div class="d-inline-flex gap-2">
      <button
        (click)="setPage('list')"
        [ngStyle]="{ background: page === 'list' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'list' ? 'text-light' : 'text-secondary'"
        >
          list
        </span>
      </button>
      <button
        (click)="setPage('map')"
        [ngStyle]="{ background: page === 'map' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'map' ? 'text-light' : 'text-secondary'"
        >
          explore_nearby
        </span>
      </button>
    </div>
  </div>

  <ng-container *ngIf="page === 'list'">
    <div class="dashboard">
      <!-- LEFT TABLE -->
      <div class="table-panel">
        <div *ngFor="let section of analyticsData">
          <div class="section-header">
            {{ section.name }}
            <span>COUNT</span>
          </div>

          <div class="ag-theme-alpine grid">
            <ag-grid-angular
              class="custom-grid"
              [rowData]="section.data"
              [columnDefs]="columnDefs"
              [domLayout]="'autoHeight'"
            >
            </ag-grid-angular>
          </div>
        </div>
      </div>

      <!-- RIGHT CHARTS -->
      <div class="chart-panel">
        <div *ngFor="let chart of charts">
          <div class="chart-title">
            {{ chart.title }}
          </div>

          <div class="chart-container">
            <ag-charts class="donut-chart" [options]="chart.options">
            </ag-charts>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="page === 'map'">
    <app-site-map
      [fromDate]="fromDate"
      [toDate]="toDate"
      [camera]="cameraId"
    ></app-site-map>
  </ng-container>
</section>
