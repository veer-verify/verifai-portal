<section>
  <app-err-info></app-err-info>

  <div class="tool-bar">
    <div *ngIf="page === 'map'"></div>

    <div class="toolbar-filters" *ngIf="page === 'list'">
      <div
        class="hamburger py-1"
        (click)="storage_service.openSideNav()"
        *ngIf="!(storage_service.showSideNav$ | async)"
      >
        &#9776;
      </div>

      <div class="toolbar-inline-filters" *ngIf="!isCompactFilters">
        <div class="select-with-icon">
          <img src="icons/drop_cam.svg" alt="" class="icon" />
          <select
            class="tag-select"
            [(ngModel)]="cameraId"
            (ngModelChange)="biAnalyticsReport()"
          >
            <option value="" selected>
              <img src="icons/drop_cam.svg" alt="" />ALL ({{ camList.length }})
            </option>
            <option *ngFor="let item of camList" [value]="item.cameraId">
              {{ item?.name }}
            </option>
          </select>
        </div>

        <div class="filter-radio-group toolbar-radio-group">
          <label class="filter-radio">
            <input
              type="radio"
              name="type"
              value="monitoring"
              [(ngModel)]="selectedOption"
              (ngModelChange)="onRadioChange()"
            />
            <span>Monitoring</span>
          </label>

          <label class="filter-radio">
            <input
              type="radio"
              name="type"
              value="business"
              [(ngModel)]="selectedOption"
              (ngModelChange)="onRadioChange()"
            />
            <span>Business Intelligence</span>
          </label>
        </div>

        <app-calendar
          [startDate]="fromDate"
          [startTime]="fromTime"
          [endDate]="toDate"
          [endTime]="toTime"
          [maxDate]="today"
          (rangeApply)="onRangeApply($event)"
        ></app-calendar>
      </div>

      <div class="filters-dropdown" *ngIf="isCompactFilters">
        <button
          type="button"
          class="filters-trigger"
          (click)="showFiltersDropdown = !showFiltersDropdown"
        >
          <span class="material-symbols-outlined">tune</span>
          <span>Filters</span>
        </button>

        <div class="filters-panel" *ngIf="showFiltersDropdown">
          <div class="filters-panel-header">
            <span>Filters</span>
            <button
              type="button"
              class="filters-close"
              (click)="showFiltersDropdown = false"
            >
              <span class="material-symbols-outlined">close_small</span>
            </button>
          </div>

          <div class="filters-panel-body">
            <div class="select-with-icon">
              <img src="icons/drop_cam.svg" alt="" class="icon" />
              <select
                class="tag-select"
                [(ngModel)]="cameraId"
                (ngModelChange)="biAnalyticsReport()"
              >
                <option value="" selected>
                  <img src="icons/drop_cam.svg" alt="" />ALL ({{ camList.length }})
                </option>
                <option *ngFor="let item of camList" [value]="item.cameraId">
                  {{ item?.name }}
                </option>
              </select>
            </div>

            <div class="filter-radio-group">
              <label class="filter-radio">
                <input
                  type="radio"
                  name="type"
                  value="monitoring"
                  [(ngModel)]="selectedOption"
                  (ngModelChange)="onRadioChange()"
                />
                <span>Monitoring</span>
              </label>

              <label class="filter-radio">
                <input
                  type="radio"
                  name="type"
                  value="business"
                  [(ngModel)]="selectedOption"
                  (ngModelChange)="onRadioChange()"
                />
                <span>Business Intelligence</span>
              </label>
            </div>

            <app-calendar
              [startDate]="fromDate"
              [startTime]="fromTime"
              [endDate]="toDate"
              [endTime]="toTime"
              [maxDate]="today"
              (rangeApply)="onRangeApply($event)"
            ></app-calendar>
          </div>
        </div>
      </div>
    </div>

    <div class="btn-sec d-inline-flex gap-2">
      <button
        class="d-inline-flex align-items-center gap-2"
        (click)="downloadBiReport()"
        [disabled]="!hasDownloadData"
        [class.disabled]="!hasDownloadData"
      >
        <img src="icons/download-insights.svg" alt="download" />
        <span>DOWNLOAD</span>
      </button>
      <button
        (click)="setPage('list')"
        [ngStyle]="{ background: page === 'list' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'list' ? 'text-light' : 'text-secondary'"
        >
          list
        </span>
      </button>
      <button
        (click)="setPage('map')"
        [ngStyle]="{ background: page === 'map' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'map' ? 'text-light' : 'text-secondary'"
        >
          explore_nearby
        </span>
      </button>
    </div>
  </div>

  <ng-container *ngIf="selectedOption === 'monitoring' && page === 'list'">
    <div class="monitoring-container">
      <div class="alert-card" *ngFor="let item of alertCounts | keyvalue">
        <div class="alert-title">
          {{ item.key }}
        </div>
        <div class="alert-count">
          {{ item.value }}
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="page === 'list' && selectedOption === 'business'">
    <div
      class="dashboard"
      [style.margin]="(storage_service.showSideNav$ | async) ? '0' : '0 40px'"
    >
      <div class="table-panel">
        <div class="analytics-section" *ngFor="let section of analyticsData">
          <div class="section-header">
            <span>{{ section.name }}</span>
            <span>
              {{
                section.name?.toUpperCase()?.includes("TIME") ||
                section.name?.toUpperCase()?.includes("PRODUCTIVITY")
                  ? "TIME"
                  : "COUNT"
              }}
            </span>
          </div>

          <div class="section-body">
            <div class="analytics-row" *ngFor="let row of section.data">
              <div class="analytics-left">
                <img
                  *ngIf="row.icon && !row._iconError"
                  class="analytics-icon"
                  [src]="getAnalyticsIcon(row.icon)"
                  (error)="row._iconError = true"
                  alt=""
                />

                <span
                  *ngIf="!row.icon || row._iconError"
                  class="fallback-dot"
                ></span>

                <span class="analytics-label">
                  {{ row.type || "-" }}
                </span>
              </div>

              <div class="analytics-value">
                {{ row.total || "0" }}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="chart-panel"
        [style.boxShadow]="analyticsData.length ? '-5px 5px 5px #0000000d' : ''"
      >
        <div *ngFor="let chart of charts">
          <div class="chart-title">
            {{ chart.title }}
          </div>

          <div class="chart-row">
            <ag-charts class="donut-chart" [options]="chart.options">
            </ag-charts>

            <div class="legend">
              <div
                class="legend-item"
                *ngFor="let item of chart.originalData; let i = index"
              >
                <span
                  class="dot"
                  [style.background]="chart.hasData ? COLORS[i] : '#E0E0E0'"
                ></span>
                <span class="label">{{ item.label }}</span>
                <span class="value" (click)="goToAlerts(item)">{{
                  item.value
                }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="page === 'map'">
    <app-site-map
      [fromDate]="fromDate"
      [toDate]="toDate"
      [camera]="cameraId"
    ></app-site-map>
  </ng-container>
</section>
