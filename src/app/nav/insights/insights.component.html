<section>
  <app-err-info></app-err-info>

  <div class="tool-bar">
    <div *ngIf="page === 'map'"></div>
    <div class="d-inline-flex gap-3" *ngIf="page === 'list'">
      <div class="select-with-icon">
        <img src="icons/drop_cam.svg" alt="" class="icon" />
        <select
          class="tag-select"
          [(ngModel)]="cameraId"
          (ngModelChange)="biAnalyticsReport()"
        >
          <option value="" selected>
            <img src="icons/drop_cam.svg" alt="" />ALL ({{ camList.length }})
          </option>
          <option *ngFor="let item of camList" [value]="item.cameraId">
            {{ item?.name }}
          </option>
        </select>
      </div>

      <!-- <div class="d-inline-flex align-items-center gap-2" *ngIf="page === 'list'"> -->
      <div class="d-inline-flex align-items-center gap-2">
        <input
          type="radio"
          name="type"
          value="monitoring"
          [(ngModel)]="selectedOption"
          (ngModelChange)="onRadioChange()"
        />
        <span>Monitoring</span>
      </div>
      <div class="d-inline-flex align-items-center gap-2">
        <input
          type="radio"
          name="type"
          value="business"
          [(ngModel)]="selectedOption"
          (ngModelChange)="onRadioChange()"
        />
        <span style="white-space: nowrap">Business Intelligence</span>
      </div>
      <!-- </div> -->

      <div class="calendar">
        <span>START</span>
        <input
          type="date"
          [(ngModel)]="fromDate"
          [max]="today"
          (ngModelChange)="biAnalyticsReport()"
        />

        <!-- <img
          src="icons/calendar.svg"
          class="calendar-icon"
          (click)="picker1.open()"
        /> -->

        <!-- <mat-datepicker #picker1></mat-datepicker> -->
      </div>

      <div class="calendar">
        <span>END</span>
        <input
          type="date"
          [(ngModel)]="toDate"
          [max]="today"
          (ngModelChange)="biAnalyticsReport()"
        />

        <!-- <img
          src="icons/calendar.svg"
          class="calendar-icon"
          (click)="picker2.open()"
        /> -->

        <!-- <mat-datepicker #picker2></mat-datepicker> -->
      </div>
    </div>

    <div class="btn-sec d-inline-flex gap-2">
      <button class="d-inline-flex align-items-center gap-2 me-3">
        <img src="icons/download-insights.svg" /><span>DOWNLOAD</span>
      </button>
      <button
        (click)="setPage('list')"
        [ngStyle]="{ background: page === 'list' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'list' ? 'text-light' : 'text-secondary'"
        >
          list
        </span>
      </button>
      <button
        (click)="setPage('map')"
        [ngStyle]="{ background: page === 'map' ? 'red' : '' }"
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="page === 'map' ? 'text-light' : 'text-secondary'"
        >
          explore_nearby
        </span>
      </button>
    </div>
  </div>

  <!--  MONITORING VIEW -->
  <ng-container *ngIf="selectedOption === 'monitoring' && page === 'list'">
    <div class="monitoring-container">
      <div class="alert-card" *ngFor="let item of alertCounts | keyvalue">
        <div class="alert-title">
          {{ item.key }}
        </div>
        <div class="alert-count">
          {{ item.value }}
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="page === 'list' && selectedOption === 'business'">
    <div class="dashboard">
      <!-- LEFT TABLE -->
      <div class="table-panel">
        <div *ngFor="let section of analyticsData">
          <div class="section-header">
            {{ section.name }}
            <span>COUNT</span>
          </div>

          <div class="ag-theme-alpine grid">
            <ag-grid-angular
              class="custom-grid"
              [headerHeight]="40"
              [rowData]="section.data"
              [columnDefs]="columnDefs"
              [domLayout]="'autoHeight'"
            >
            </ag-grid-angular>
          </div>
        </div>
      </div>

      <!-- RIGHT CHARTS -->
      <div class="chart-panel">
        <div *ngFor="let chart of charts">
          <div class="chart-title">
            {{ chart.title }}
          </div>

          <!-- <div class="chart-container">
            <ag-charts class="donut-chart" [options]="chart.options">
            </ag-charts>
          </div> -->

          <div class="chart-row">
            <!-- Donut -->
            <ag-charts class="donut-chart" [options]="chart.options">
            </ag-charts>

            <!-- Custom Legend -->
            <div class="legend">
              <div
                class="legend-item"
                *ngFor="let item of chart.originalData; let i = index"
              >
                <span
                  class="dot"
                  [style.background]="chart.hasData ? COLORS[i] : '#E0E0E0'"
                ></span>
                <span class="label">{{ item.label }}</span>
                <span class="value">{{ item.value }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="page === 'map'">
    <app-site-map
      [fromDate]="fromDate"
      [toDate]="toDate"
      [camera]="cameraId"
    ></app-site-map>
  </ng-container>
</section>
