<section>
  <div class="tool-bar">
    <!-- <form> -->
    <div class="select-with-icon">
      <img src="icons/drop_cam.svg" alt="" class="icon" />
      <select class="tag-select">
        <option selected><img src="icons/drop_cam.svg" alt="" />ALL</option>
        <option disabled>No cameras available</option>
      </select>
    </div>
    <div class="calendar">
      <span>START</span>
      <input
        matInput
        [matDatepicker]="picker1"
        placeholder="MM-DD-YYYY"
        [(ngModel)]="fromDate"
      />

      <img
        src="icons/calendar.svg"
        class="calendar-icon"
        (click)="picker1.open()"
      />

      <mat-datepicker #picker1></mat-datepicker>
    </div>

    <div class="calendar">
      <span>END</span>
      <input
        matInput
        [matDatepicker]="picker2"
        placeholder="MM-DD-YYYY"
        [(ngModel)]="toDate"
      />

      <img
        src="icons/calendar.svg"
        class="calendar-icon"
        (click)="picker2.open()"
      />

      <mat-datepicker #picker2></mat-datepicker>
    </div>

    <div class="d-inline-flex gap-2">
      <button>list</button>
      <button>map</button>
    </div>
    <!-- </form> -->
  </div>

  <div class="dashboard">
    <!-- LEFT TABLE -->
    <div class="table-panel">
      <div *ngFor="let section of analyticsData">
        <div class="section-header">
          {{ section.name }}
          <!-- <span>COUNT</span> -->
        </div>

        <div class="ag-theme-alpine grid">
          <ag-grid-angular
            [rowData]="section.data"
            [columnDefs]="columnDefs"
            [domLayout]="'autoHeight'"
          >
          </ag-grid-angular>
        </div>
      </div>
    </div>

    <!-- RIGHT CHARTS -->
    <div class="chart-panel">
      <div *ngFor="let chart of charts">
        <div class="chart-title">
          {{ chart.title }}
        </div>

        <ag-charts class="donut-chart" [options]="chart.options"> </ag-charts>
      </div>
    </div>
  </div>
</section>
