<div class="drawer-backdrop">
  <div class="drawer">
    <div class="drawer-header">
      <h3>CREATE CAMERA</h3>
      <button class="close-btn" (click)="close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="drawer-body">
      
      <div class="form-grid">
        <div class="form-field">
          <label>Client Name</label>
          <select [(ngModel)]="cameraForm.clientName" disabled>
            <option value="">Select</option>
            <option [value]="cameraForm.clientName">{{ cameraForm.clientName }}</option>
          </select>
        </div>
        <div class="form-field">
          <label>Site Name</label>
          <select [(ngModel)]="cameraForm.siteName" disabled>
            <option value="">Select</option>
            <option [value]="cameraForm.siteName">{{ cameraForm.siteName }}</option>
          </select>
        </div>
        <div class="form-field">
          <label>Device ID</label>
          <select [(ngModel)]="cameraForm.unitId" disabled>
            <option value="">Select</option>
            <option [value]="cameraForm.unitId">{{ cameraForm.unitId }}</option>
          </select>
        </div>
        <div class="form-field full-width">
          <label>Copy To</label>
          <select [(ngModel)]="cameraForm.copyTo">
            <option value="">Select</option>
          </select>
        </div>
      </div>

      <div class="section-header">
        <span>BASIC INFO</span>
        <div class="section-line"></div>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Camera Name</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.name" />
        </div>
        <div class="form-field">
          <label>Client Camera Name</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.clientCameraName" />
        </div>
        <div class="form-field">
          <label>Camera Type</label>
          <select [(ngModel)]="cameraForm.cameraType">
            <option value="">Select</option>
            <option value="PTZ">PTZ</option>
            <option value="Bullet">Bullet</option>
          </select>
        </div>
        <div class="form-field">
          <label>Make</label>
          <select [(ngModel)]="cameraForm.make">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Model</label>
          <select [(ngModel)]="cameraForm.model">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Serial Number</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.serialNumber" />
        </div>
        <div class="form-field">
          <label>Mac ID</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.macId" />
        </div>
        <div class="form-field">
          <label>Registration Code</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.registrationCode" />
        </div>
        <div class="form-field">
          <label>QR Code</label>
          <div class="file-upload-row">
            <input type="text" placeholder="(Upload Image)" readonly />
            <button class="browse-btn">Browse</button>
          </div>
        </div>
        <div class="form-field">
          <label>Camera Direction</label>
          <select [(ngModel)]="cameraForm.cameraDirection">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Camera Placement</label>
          <div class="file-upload-row">
            <input type="text" placeholder="(Upload Image)" readonly />
            <button class="browse-btn">Browse</button>
          </div>
        </div>
      </div>

      
         <div class="section-header">
          <span>CONFIGURATION</span>
          <div class="section-line"></div>
        </div>
      <div class="form-grid">
        <div class="form-field">
          <label>User Name</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.userName" />
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.password" />
        </div>
        <div class="form-field">
          <label>Camera IP Address</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.cameraIp" />
        </div>
        <div class="form-field">
          <label>Port</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.portNo" />
        </div>
        <div class="form-field" style="grid-column: span 2;">
          <label>RTSP URL</label>
          <input type="text" placeholder="Display URL" [(ngModel)]="cameraForm.rtspUrl" />
        </div>
        <div class="form-field">
          <label>Width</label>
          <select [(ngModel)]="cameraForm.width">
            <option value="">Select</option>
            <option value="1920">1920</option>
          </select>
        </div>
        <div class="form-field">
          <label>Height</label>
          <select [(ngModel)]="cameraForm.height">
            <option value="">Select</option>
            <option value="1080">1080</option>
          </select>
        </div>
        <div class="form-field">
          <label>FPS</label>
          <select [(ngModel)]="cameraForm.fps">
            <option value="">Select</option>
            <option value="30">30</option>
          </select>
        </div>
        <div class="form-field">
          <label>Resolution</label>
          <select [(ngModel)]="cameraForm.resolution">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Bitrate</label>
          <select [(ngModel)]="cameraForm.bitrate">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Recovery Email</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.recoveryEmail" />
        </div>
        <div class="form-field">
          <label>Security Questions</label>
          <select [(ngModel)]="cameraForm.securityQuestions">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Firmware Version</label>
          <select [(ngModel)]="cameraForm.firmwareVersion">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Priority</label>
          <select [(ngModel)]="cameraForm.priority">
            <option value="">Select</option>
            <option value="T">High</option>
          </select>
        </div>
        <div class="form-field">
          <label>Native App Name</label>
          <select [(ngModel)]="cameraForm.nativeAppName">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>Onivif</label>
          <select [(ngModel)]="cameraForm.onivif">
            <option value="">Select</option>
          </select>
        </div>
      </div>
      
      <div class="form-grid" style="margin-top: 10px;">
        <div class="form-field toggle-field">
          <label>FTP Server</label>
          <label class="toggle-switch">
            <input type="checkbox" [(ngModel)]="cameraForm.ftpServer" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="form-field">
          <label>FTP Server Type</label>
          <select [(ngModel)]="cameraForm.ftpServerType">
            <option value="">Select</option>
          </select>
        </div>
        <div class="form-field">
          <label>&nbsp;</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.ftpServerValue" />
        </div>
      </div>

         <div class="section-header">
          <span>SERVICES</span>
          <div class="section-line"></div>
        </div>
      <div class="form-grid">
        <div class="form-field toggle-field">
          <label>Monitoring</label>
          <label class="toggle-switch">
            <input type="checkbox" [(ngModel)]="cameraForm.monitoring" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="form-field toggle-field">
          <label>Events</label>
          <label class="toggle-switch">
            <input type="checkbox" [(ngModel)]="cameraForm.events" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="form-field toggle-field">
          <label>Analytics</label>
          <label class="toggle-switch">
            <input type="checkbox" [(ngModel)]="cameraForm.analytics" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="form-field">
          <label>Events Where to Run</label>
          <select [(ngModel)]="cameraForm.eventsWhereToRun">
            <option value="AWS">AWS</option>
          </select>
        </div>
        <div class="form-field">
          <label>Event AWS Server</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.eventsServerIp" />
        </div>
        <div class="form-field">
          <label>Event AWS Port</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.eventAwsPort" />
        </div>

        <div class="form-field">
          <label>Audio Device</label>
          <select [(ngModel)]="cameraForm.audioSpeakerType">
            <option value="">Select (Ex: Speaker3-Analog)</option>
            <option value="Analog">Analog</option>
          </select>
        </div>
        <div class="form-field" style="grid-column: span 2;">
          <label>Storage Path</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.storagePath" />
        </div>

        <div class="form-field">
          <label>Status</label>
          <select [(ngModel)]="cameraForm.status">
            <option value="">Select</option>
            <option value="Y">Active</option>
            <option value="N">Inactive</option>
          </select>
        </div>
        <div class="form-field" style="grid-column: span 2;">
          <label>Remarks</label>
          <input type="text" placeholder="Enter" [(ngModel)]="cameraForm.remarks" />
        </div>
      </div>

      <div class="footer-actions">
        <button class="cancel-btn" (click)="close()">CANCEL</button>
        <button class="save-btn" (click)="saveCamera()" [disabled]="saving">
          {{ saving ? 'SAVING...' : 'CREATE' }}
        </button>
      </div>
    </div>
  </div>
</div>
