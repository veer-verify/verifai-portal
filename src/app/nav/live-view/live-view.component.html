<section class="sub-header">
  @if (camList.length) {
    <div class="site-info">
      <div
        class="hamburger"
        (click)="storage_service.openSideNav()"
        *ngIf="!(storage_service.showSideNav$ | async)"
      >
        ☰
      </div>

      <!-- <div class="select-with-icon">
        <img src="icons/drop_cam.svg" class="icon" />
        <select (change)="adjustGrid($event)">
          <option value="">
            <img src="icons/drop_cam.svg" alt="" />All ({{ camList.length }})
          </option>
          @for (item of camList; track $index) {
            <option [value]="item?.cameraId" #val>
              {{ item?.name }}
            </option>
          }
        </select>
      </div> -->
    </div>

    <!-- pagination -->
    <div class="d-flex gap-3">
      <div class="d-flex align-items-center gap-3">
        @for (item of gridTypes; track $index) {
          <a
            class="grid-highlight"
            [style.opacity]="itemsPerPage == item.noOfItems ? '1' : '0.5'"
            (click)="adjustGrid(item.noOfItems)"
          >
            <img
              [src]="
                itemsPerPage == item.noOfItems ? item.activePath : item.path
              "
              width="16px"
              alt=""
            />
            <!-- {{ item?.label }} -->
          </a>
        }
      </div>

      <div class="d-inline-flex align-items-center">
        <button (click)="navigate('prev')" [disabled]="currentPage === 1">
          <span class="material-symbols-outlined">keyboard_arrow_left </span>
        </button>
        <a>{{ `${currentPage} - ${totalPages}` }}</a>
        <button
          (click)="navigate('next')"
          [disabled]="currentPage === totalPages"
        >
          <span class="material-symbols-outlined">keyboard_arrow_right </span>
        </button>
      </div>
    </div>

    <div class="interaction-controls">
      <button
        type="button"
        class="mode-button"
        [class.active]="isDragEnabled"
        (click)="toggleDragDrop()"
      >
        {{ isDragEnabled ? 'Disable Drag' : 'Enable Drag' }}
      </button>
      <button
        type="button"
        class="mode-button"
        [class.active]="isDotEnabled"
        (click)="toggleDotPlacement()"
      >
        {{ isDotEnabled ? 'Disable Dot' : 'Enable Dot' }}
      </button>
    </div>

    <div class="d-inline-flex align-items-center gap-2">
      <span class="hover-bar" [class.analyticsred]="isChecked"
        >camera info</span
      >
      <label class="switch">
        <input type="checkbox" [(ngModel)]="isChecked" />
        <span class="slider"></span>
      </label>
    </div>
  }
</section>

<!-- camera container -->
<section
  class="grid-container"
  #gridContainer
  cdkDropList
  [cdkDropListData]="paginatedList"
  [cdkDropListDisabled]="!isDragEnabled"
  cdkDropListOrientation="mixed"
  (cdkDropListDropped)="dropStream($event)"
>
  @for (item of paginatedList; track item.cameraId) {
    <div
      class="grid-item"
      [ngClass]="itemsPerPage === 1 ? 'single-view' : ''"
      cdkDrag
      [cdkDragDisabled]="!isDragEnabled"
      #gridItem
    >
      @if (isDragEnabled) {
        <button
          type="button"
          class="drag-handle"
          cdkDragHandle
          title="Drag to reorder"
          aria-label="Drag stream to reorder"
          (click)="$event.stopPropagation()"
        >
          <span class="material-symbols-outlined">drag_indicator</span>
        </button>
      }
      <app-stream
        [videoData]="item"
        [isChecked]="isChecked"
        [dotEnabled]="isDotEnabled"
        (dotPlaced)="onDotPlaced($event)"
      ></app-stream>
    </div>
  }
</section>
